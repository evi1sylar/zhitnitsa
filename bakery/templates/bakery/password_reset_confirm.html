{% extends 'bakery/base.html' %}

{% block title %}Новый пароль — Житница{% endblock %}

{% block content %}
<section class="section login-page">
    <div class="login-form">
        <h1 class="login-form__title">Установить новый пароль</h1>
        <form method="post" action="{% url 'password_reset_confirm' uidb64 token %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="password">Новый пароль</label>
                <div style="position:relative;">
                    <input type="password" id="password" name="password" required minlength="6" style="padding-right:45px;">
                    <button type="button" class="toggle-password" data-target="password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.2rem;cursor:pointer;opacity:0.6; padding:0 5px;">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label for="password2">Повторите пароль</label>
                <div style="position:relative;">
                    <input type="password" id="password2" name="password2" required minlength="6" style="padding-right:45px;">
                    <button type="button" class="toggle-password" data-target="password2" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.2rem;cursor:pointer;opacity:0.6; padding:0 5px;">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn--accent" style="width:100%;">Установить пароль</button>
        </form>
    </div>
</section>

{% block extra_js %}
<script>
document.querySelectorAll('.toggle-password').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var targetId = this.getAttribute('data-target');
        var input = document.getElementById(targetId);
        if (input && input.type === 'password') {
            input.type = 'text';
            this.textContent = '🙈';
        } else if (input) {
            input.type = 'password';
            this.textContent = '👁️';
        }
    });
});
</script>
{% endblock %}
{% endblock %}
