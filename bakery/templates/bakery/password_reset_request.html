{% extends 'bakery/base.html' %}

{% block title %}Сброс пароля — Житница{% endblock %}

{% block content %}
<section class="section login-page">
    <div class="login-form">
        <h1 class="login-form__title">Сброс пароля</h1>
        <p style="text-align:center;color:var(--text-light);margin-bottom:24px;">Введите ваш email, и мы отправим инструкцию для сброса пароля.</p>
        <form method="post" action="{% url 'password_reset_request' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.ru">
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%;">Отправить</button>
        </form>
        <p style="text-align:center;margin-top:16px;">
            <a href="{% url 'login' %}" style="color:var(--brown);">← Вернуться ко входу</a>
        </p>
    </div>
</section>
{% endblock %}
